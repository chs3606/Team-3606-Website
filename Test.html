<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Grid Example</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f4f4f4;
    }

    /* Grid container */
    .image-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
    }

    /* Image styling */
    .image-grid img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
</style>
</head>
<body>

<h1>Responsive Image Grid</h1>

<div class="image-grid">
    <img src="https://via.placeholder.com/400x300" alt="Image 1">
    <img src="https://via.placeholder.com/400x300" alt="Image 2">
    <img src="https://via.placeholder.com/400x300" alt="Image 3">
    <img src="https://via.placeholder.com/400x300" alt="Image 4">
    <img src="https://via.placeholder.com/400x300" alt="Image 5">
    <img src="https://via.placeholder.com/400x300" alt="Image 6">
</div>

</body>
</html>
