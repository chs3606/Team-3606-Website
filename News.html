  <!-- Main content -->

  <!-- ==================== ADMIN MODAL ==================== -->

  <!-- ==================== FIREBASE + NEWS LOGIC ==================== -->
  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCBQLHlQLv708JDF55ClvThg4iBGAxC1Z0",
      authDomain: "bearmetal3606-d4975.firebaseapp.com",
      projectId: "bearmetal3606-d4975",
      storageBucket: "bearmetal3606-d4975.firebasestorage.app",
      messagingSenderId: "693146086909",
      appId: "1:693146086909:web:33e29afe52ebf239eb7d94"
    };

    // *** CHANGE THIS to your desired 6-digit passcode ***
    // Must match the passcode in Calendar.html if you want the same code for both
    const PASSCODE = "863759";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Local copy of all articles fetched from Firestore
    let articles = [];

    // Fetch articles from Firestore ordered newest first, then render them
    async function loadArticles() {
      const q = query(collection(db, "news_articles"), orderBy("timestamp", "desc"));
      const snapshot = await getDocs(q);
      articles = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderArticles();
    }

    // Render all articles as cards on the page
    function renderArticles() {
      const container = document.getElementById("news-container");
      document.getElementById("loading-msg")?.remove();
      container.innerHTML = "";

      if (articles.length === 0) {
        container.innerHTML = "<p class='no-articles-msg'>No articles yet. Check back soon!</p>";
        return;
      }

      articles.forEach(article => {
        const card = document.createElement("div");
        card.className = "news-card";

        // Format the Firestore timestamp into a readable date/time string
        let timeStr = "";
        if (article.timestamp) {
          const date = article.timestamp.toDate();
          timeStr = date.toLocaleDateString("en-US", {
            year: "numeric", month: "long", day: "numeric",
            hour: "2-digit", minute: "2-digit"
          });
        }

        card.innerHTML = `
          <div class="news-card-header">
            <p class="news-title">${article.title}</p>
            <p class="news-time">${timeStr}</p>
          </div>
          ${article.imageUrl ? `<img class="news-image" src="${article.imageUrl}" alt="${article.title}">` : ""}
          <p class="news-desc">${article.description}</p>
        `;

        container.appendChild(card);
      });
    }

    // ==================== PASSCODE FLOW ====================

    document.getElementById("edit-btn").onclick = () => {
      document.getElementById("passcode-overlay").style.display = "flex";
      document.getElementById("passcode-input").value = "";
      document.getElementById("passcode-error").textContent = "";
    };

    document.getElementById("passcode-cancel").onclick = () => {
      document.getElementById("passcode-overlay").style.display = "none";
    };

    document.getElementById("passcode-submit").onclick = () => {
      const input = document.getElementById("passcode-input").value;
      if (input === PASSCODE) {
        document.getElementById("passcode-overlay").style.display = "none";
        openAdmin();
      } else {
        document.getElementById("passcode-error").textContent = "Incorrect passcode. Try again.";
      }
    };

    document.getElementById("passcode-input").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("passcode-submit").click();
    });

    // ==================== ADMIN GUI ====================

    function openAdmin() {
      document.getElementById("admin-overlay").style.display = "flex";
      renderAdminList();
    }

    document.getElementById("close-admin").onclick = () => {
      document.getElementById("admin-overlay").style.display = "none";
    };

    // Populate the existing articles list inside the admin modal
    function renderAdminList() {
      const list = document.getElementById("admin-articles-list");
      list.innerHTML = "";

      if (articles.length === 0) {
        list.innerHTML = "<p class='no-articles-msg'>No articles yet.</p>";
        return;
      }

      // Articles already sorted newest first from Firestore query
      articles.forEach(article => {
        let timeStr = "";
        if (article.timestamp) {
          const date = article.timestamp.toDate();
          timeStr = date.toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
        }

        const row = document.createElement("div");
        row.className = "admin-event-row";
        row.innerHTML = `
          <div class="admin-event-info">
            <span class="admin-event-name">${article.title}</span>
            <span class="admin-event-date">${timeStr}</span>
          </div>
          <button class="delete-btn" data-id="${article.id}">Delete</button>
        `;

        // Delete removes the article from Firestore and re-renders both lists
        row.querySelector(".delete-btn").onclick = async () => {
          await deleteDoc(doc(db, "news_articles", article.id));
          articles = articles.filter(a => a.id !== article.id);
          renderArticles();
          renderAdminList();
        };

        list.appendChild(row);
      });
    }

    // Post a new article to Firestore when Add Article is clicked
    document.getElementById("add-article-btn").onclick = async () => {
      const title = document.getElementById("article-title").value.trim();
      const imageUrl = document.getElementById("article-image").value.trim();
      const description = document.getElementById("article-desc").value.trim();

      if (!title || !description) {
        alert("Please enter at least a title and article content.");
        return;
      }

      // serverTimestamp() lets Firestore set the exact time the article was posted
      const docRef = await addDoc(collection(db, "news_articles"), {
        title,
        imageUrl: imageUrl || "",
        description,
        timestamp: serverTimestamp()
      });

      // Add to local array at the front so it appears first (newest)
      articles.unshift({
        id: docRef.id,
        title,
        imageUrl: imageUrl || "",
        description,
        timestamp: { toDate: () => new Date() }
      });

      // Clear the form
      document.getElementById("article-title").value = "";
      document.getElementById("article-image").value = "";
      document.getElementById("article-desc").value = "";

      renderArticles();
      renderAdminList();
    };

    loadArticles();

  </script>
