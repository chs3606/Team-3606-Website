  <!-- .content is the main body section of the Gallery page -->

     <p class="pagetitle">
      Gallery
      </p>

    <!-- ==================== SLIDESHOW ==================== -->
    <!-- .slideshow is the container for the entire slideshow widget -->
    <div class="slideshow">

      <!-- .slidepicwrapper wraps the caption and photo together so they stay grouped -->
      <div class="slidepicwrapper">

        <!-- .slidetitle is the caption for the current slide -->
        <!-- id="slide-title" is updated by Gallery.js when the slide changes -->
        <!-- The initial text here matches the first slide in the Gallery.js slides array -->
        <p class="slidetitle" id="slide-title">Working on the Robot at 2026 Competition 1</p>

        <!-- .slidepic is the current slide photo -->
        <!-- id="slide-img" is updated by Gallery.js when the slide changes -->
        <!-- src points to the first image in the Gallery.js slides array -->
        <!-- Update src if the first slide image changes -->
        <img class="slidepic" id="slide-img" src="Gallery/2026/2026WorkComp1.jpg" alt="slide">

      </div>
      <!-- End .slidepicwrapper -->

      <!-- .slidecounter displays the current slide number, e.g. "1 / 12" -->
      <!-- id="slide-counter" is updated by Gallery.js when the slide changes -->
      <!-- The initial text here should match the total number of slides in Gallery.js -->
      <p class="slidecounter" id="slide-counter">1 / 12</p>

      <!-- .slidecontrols holds the previous and next navigation buttons -->
      <div class="slidecontrols">

        <!-- .prevbut goes to the previous slide — id="prev" is used by Gallery.js -->
        <button class="prevbut" id="prev">←</button>

        <!-- .nextbut goes to the next slide — id="next" is used by Gallery.js -->
        <button class="nextbut" id="next">→</button>

      </div>
      <!-- End .slidecontrols -->

    </div>
    <!-- End .slideshow -->

  </div>
